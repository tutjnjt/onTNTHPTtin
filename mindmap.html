// Tính tọa độ px/py cho tất cả node trước khi vẽ
function setPos(node, parentX, parentY){
  if(node.id === 'root'){
    node.px = 0; node.py = 0;
  } else {
    node.px = parentX + Math.cos(node.angle) * node.dist;
    node.py = parentY + Math.sin(node.angle) * node.dist;
  }
  if(node.children){
    node.children.forEach(c => setPos(c, node.px, node.py));
  }
}
setPos(ROOT, 0, 0);

function flat(n, a=[]){ a.push(n); (n.children||[]).forEach(c=>flat(c,a)); return a; }
const ALL = flat(ROOT);

function tx(n){ return (n.px||0)*scale + ox + W/2; }
function ty(n){ return (n.py||0)*scale + oy + H/2; }

function isFiniteXY(x, y){ return isFinite(x) && isFinite(y); }

function drawEdge(p, c){
  const x1=tx(p), y1=ty(p), x2=tx(c), y2=ty(c);
  if(!isFiniteXY(x1,y1)||!isFiniteXY(x2,y2)) return;
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  const mx=(x1+x2)/2;
  ctx.bezierCurveTo(mx, y1, mx, y2, x2, y2);
  ctx.strokeStyle = c.color+'55';
  ctx.lineWidth = Math.max(1, 1.5*scale);
  ctx.stroke();
}

function drawNode(n){
  const cx=tx(n), cy=ty(n), r=n.r*scale;
  if(!isFiniteXY(cx,cy)||!isFinite(r)||r<=0) return;
  if(n.glow){
    try {
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r*2.4);
      g.addColorStop(0, n.glow); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,r*2.4,0,Math.PI*2); ctx.fill();
    } catch(e){}
  }
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle='rgba(7,9,15,0.92)'; ctx.fill();
  ctx.strokeStyle=n.color; ctx.lineWidth=n.id==='root'?3*scale:2*scale; ctx.stroke();
  ctx.fillStyle=n.id==='root'?'#fff':n.color;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const lines=n.label.split('\n');
  const fs=Math.max(7, (n.id==='root'?13:n.r>35?11:9.5)*scale);
  ctx.font=`700 ${fs}px 'Be Vietnam Pro'`;
  const lh=fs+3;
  lines.forEach((l,i)=>ctx.fillText(l, cx, cy-(lines.length-1)*lh/2+i*lh));
}

function drawEdges(n){ (n.children||[]).forEach(c=>{ drawEdge(n,c); drawEdges(c); }); }

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#07090f'; ctx.fillRect(0,0,W,H);
  drawEdges(ROOT);
  ALL.forEach(drawNode);
}

resize();

// Drag
C.addEventListener('mousedown', e=>{ dragging=true; dsx=e.clientX-ox; dsy=e.clientY-oy; });
window.addEventListener('mouseup', ()=>dragging=false);
window.addEventListener('mousemove', e=>{
  if(dragging){ ox=e.clientX-dsx; oy=e.clientY-dsy; draw(); return; }
  const mx=e.clientX, my=e.clientY;
  let found=null;
  ALL.forEach(n=>{ if(Math.hypot(mx-tx(n), my-ty(n))<n.r*scale+8) found=n; });
  if(found){
    tip.style.opacity='1';
    let lx=mx+18, ly=my-10;
    if(lx+310>W) lx=mx-320;
    if(ly+200>H) ly=H-210;
    tip.style.left=lx+'px'; tip.style.top=ly+'px';
    tip.innerHTML=`<strong style="color:${found.color}">${found.label.replace(/\n/g,' ')}</strong>${found.desc.replace(/\n/g,'<br>')}`;
  } else { tip.style.opacity='0'; }
});

// Zoom
C.addEventListener('wheel', e=>{
  e.preventDefault();
  const factor = e.deltaY<0?1.1:0.91;
  const mx=e.clientX, my=e.clientY;
  ox = mx - (mx-ox)*factor;
  oy = my - (my-oy)*factor;
  scale = Math.min(3, Math.max(0.3, scale*factor));
  draw();
}, {passive:false});

// Touch
let lastTouchDist=0;
C.addEventListener('touchstart', e=>{ dragging=true; dsx=e.touches[0].clientX-ox; dsy=e.touches[0].clientY-oy; e.preventDefault(); },{passive:false});
C.addEventListener('touchend', ()=>dragging=false);
C.addEventListener('touchmove', e=>{
  if(e.touches.length===1 && dragging){ ox=e.touches[0].clientX-dsx; oy=e.touches[0].clientY-dsy; draw(); }
  e.preventDefault();
},{passive:false});
