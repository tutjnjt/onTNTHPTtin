const CATNAME={1:'🤖 12A · AI',2:'🌐 12B · Mạng',3:'🌐 12F · Web',4:'💻 10F · Python',5:'⚖️ 12D · Đạo đức',6:'🎯 12G · HN',7:'🗄️ 11F · CSDL'};
const CATCOL={1:'#ff6b35',2:'#38bdf8',3:'#a78bfa',4:'#34d399',5:'#fcd34d',6:'#f472b6',7:'#67e8f9'};
const LVNAME={B:'Nhận biết',H:'Thông hiểu',V:'Vận dụng'};
const LVCOL={B:'rgba(16,185,129,.15)',H:'rgba(245,158,11,.15)',V:'rgba(239,68,68,.15)'};
const LVTXT={B:'#10b981',H:'#fcd34d',V:'#f87171'};
const BOOKLABEL={both:'⚪ Chung 2 bộ',kntt:'🔵 Kết nối tri thức',cd:'🟡 Cánh Diều'};
const BOOKCLS={both:'bb-both',kntt:'bb-kntt',cd:'bb-cd'};

let fil=[...CARDS], cur=0, flipped=false;

function sf(f, btn){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  fil = f===0?[...CARDS]:CARDS.filter(c=>c.cat===f);
  cur=0; flipped=false; upd();
}

function upd(){
  const c=fil[cur];
  document.getElementById('fq').textContent=c.q;
  document.getElementById('fa').textContent=c.a;
  const ce=document.getElementById('fcat');
  ce.textContent=CATNAME[c.cat]||'';
  ce.style.background=(CATCOL[c.cat]||'#fff')+'22';
  ce.style.color=CATCOL[c.cat]||'#fff';
  const le=document.getElementById('flv');
  le.textContent='Mức: '+LVNAME[c.lv];
  le.style.background=LVCOL[c.lv]; le.style.color=LVTXT[c.lv];
  const be=document.getElementById('fbook');
  be.textContent=BOOKLABEL[c.book||'both'];
  be.className='book-badge '+(BOOKCLS[c.book||'both']);
  document.getElementById('cur').textContent=cur+1;
  document.getElementById('tot').textContent=fil.length;
  document.getElementById('pf').style.width=((cur+1)/fil.length*100)+'%';
  document.getElementById('c3d').classList.remove('flipped');
  document.getElementById('aib').className='aibox';
  flipped=false;
}

function flip(){flipped=!flipped;document.getElementById('c3d').classList.toggle('flipped',flipped);}
function nxt(){cur=(cur+1)%fil.length;upd();}
function prev(){cur=(cur-1+fil.length)%fil.length;upd();}

async function askAI(){
  const c=fil[cur];
  const box=document.getElementById('aib');
  box.className='aibox show';
  box.innerHTML='<span class="think">✨ AI đang phân tích...</span>';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:900,
        system:`Bạn là giáo viên Tin học dạy lớp 12 chương trình GDPT 2018 tại Phú Thọ, cụm 308.
Bộ sách: ${c.book==='cd'?'Cánh Diều':c.book==='kntt'?'Kết nối tri thức':'cả Kết nối tri thức lẫn Cánh Diều'}.
Giải thích ngắn gọn, dễ nhớ, có mẹo thi, liên hệ thực tế. Tối đa 170 từ. Tiếng Việt, emoji phù hợp.`,
        messages:[{role:'user',content:`Chủ đề: ${CATNAME[c.cat]} | Mức: ${LVNAME[c.lv]}\nCâu hỏi: ${c.q}\nĐáp án: ${c.a}\n\nGiải thích sâu hơn, cho mẹo nhớ và liên hệ thực tế đề thi.`}]
      })
    });
    const d=await res.json();
    const t=d.content?.map(i=>i.text||'').join('')||'Không có phản hồi.';
    box.innerHTML='<strong style="color:#a78bfa;display:block;margin-bottom:8px">✨ Giải thích từ AI (Claude):</strong>'+t.replace(/\n/g,'<br>');
  }catch(e){box.innerHTML='⚠️ Không thể kết nối AI.';}
}

upd();
</script>
